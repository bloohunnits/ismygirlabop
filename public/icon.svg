<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3b94"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3b94;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0.1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Glow circle -->
  <circle cx="256" cy="240" r="160" fill="url(#glow)"/>
  <!-- Magnifying glass circle -->
  <circle cx="230" cy="220" r="120" fill="none" stroke="url(#accent)" stroke-width="20"/>
  <!-- Magnifying glass handle -->
  <line x1="318" y1="308" x2="410" y2="400" stroke="url(#accent)" stroke-width="24" stroke-linecap="round"/>
  <!-- B letter -->
  <text x="188" y="256" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="160" fill="url(#accent)">B</text>
  <!-- Question mark -->
  <text x="340" y="160" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="80" fill="#ff3b94" opacity="0.8">?</text>
</svg>
